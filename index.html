<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fooddie Cafe</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#FFF8F0;min-height:100vh}
#splash{position:fixed;inset:0;background:linear-gradient(135deg,#FF6B35,#FF8C61);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 1s}
#splash.hide{opacity:0;pointer-events:none}
@keyframes jump{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
.app{max-width:480px;margin:0 auto;background:white;min-height:100vh;box-shadow:0 0 40px rgba(0,0,0,.1)}
.header{background:linear-gradient(135deg,#FF6B35,#FF8C61);padding:28px 20px 20px;text-align:center;color:white}
.header h1{font-size:28px;font-weight:800}
.header p{font-size:14px;opacity:.9;margin-top:4px}
.pts-bar{background:rgba(255,255,255,.2);padding:7px 16px;border-radius:20px;margin-top:10px;font-size:13px;font-weight:700;display:inline-block}
.user-bar{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:10px}
.user-bar img{width:30px;height:30px;border-radius:50%;border:2px solid white}
.user-bar span{font-size:13px;font-weight:600}
.ubtn{background:rgba(255,255,255,.2);border:2px solid white;color:white;padding:5px 14px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer}
.tabs{display:flex;gap:8px;justify-content:center;margin-top:14px}
.tab{background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.3);color:white;padding:7px 20px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer}
.tab.active{background:white;color:#FF6B35;border-color:white}
.sbox{padding:14px 16px;background:white;border-bottom:2px solid #FFF0E6;position:relative}
.sbox input{width:100%;padding:12px 14px 12px 44px;border-radius:22px;border:2px solid #FFE0CC;font-size:14px;font-family:'Poppins',sans-serif}
.sbox .si{position:absolute;left:30px;top:50%;transform:translateY(-50%);font-size:18px}
.cats{display:flex;gap:8px;padding:14px 16px;overflow-x:auto;background:white;border-bottom:2px solid #FFF0E6}
.cats::-webkit-scrollbar{display:none}
.cbt{padding:8px 20px;border-radius:22px;border:2px solid #FFE0CC;background:white;color:#2D3436;font-weight:600;font-size:13px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.cbt.active{background:linear-gradient(135deg,#FF6B35,#FF8C61);color:white;border-color:#FF6B35}
.mwrap{padding:16px 16px 160px}
.spbox{background:linear-gradient(135deg,#FFD93D,#FFC107);border-radius:18px;padding:18px;margin-bottom:18px}
.spbox h3{font-size:18px;font-weight:800;margin-bottom:12px;color:#2D3436}
.spcard{background:white;border-radius:14px;padding:14px;margin-bottom:10px;display:flex;gap:12px;align-items:center}
.spimg{width:70px;height:70px;border-radius:12px;object-fit:cover;flex-shrink:0}
.spico{width:70px;height:70px;border-radius:12px;background:#FFE8D6;display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0}
.mcard{background:linear-gradient(135deg,#FFFAF5,white);border-radius:18px;padding:16px;margin-bottom:14px;display:flex;align-items:center;gap:14px;border:2px solid #FFE8D6;position:relative}
.mcard.unavail{opacity:.5;pointer-events:none}
.badge{position:absolute;top:10px;right:10px;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700;color:white;background:linear-gradient(135deg,#FF6B35,#FF8C61)}
.badge.out{background:#636E72}
.mimg{width:68px;height:68px;border-radius:14px;object-fit:cover;flex-shrink:0}
.mico{width:68px;height:68px;border-radius:14px;background:linear-gradient(135deg,#FFE8D6,#FFF5EB);display:flex;align-items:center;justify-content:center;font-size:38px;flex-shrink:0}
.iinfo{flex:1;min-width:0}
.iinfo h4{font-size:15px;font-weight:700;color:#2D3436;margin-bottom:3px}
.iinfo p{font-size:12px;color:#636E72;margin-bottom:6px}
.iinfo .pr{font-size:18px;font-weight:800;color:#FF6B35}
.qbox{display:flex;align-items:center;gap:8px;flex-shrink:0}
.qbtn{width:32px;height:32px;border-radius:50%;border:2px solid #FF6B35;background:white;color:#FF6B35;font-size:20px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qnum{font-size:16px;font-weight:800;min-width:22px;text-align:center}
.paybar{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:448px;background:white;border-radius:14px;padding:10px 18px;box-shadow:0 4px 16px rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center;gap:14px;z-index:90}
.cartbtn{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:448px;background:linear-gradient(135deg,#44CF6C,#38B85E);color:white;border:none;padding:16px 24px;border-radius:18px;font-size:17px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:space-between;z-index:100;box-shadow:0 8px 24px rgba(68,207,108,.4)}
.cbadge{background:white;color:#44CF6C;padding:5px 14px;border-radius:12px;font-size:15px;font-weight:800}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:500;padding:16px}
.ov.show{display:flex}
.mod{background:white;border-radius:24px;padding:24px;width:100%;max-width:420px;max-height:88vh;overflow-y:auto}
.mod h2{font-size:22px;font-weight:800;color:#2D3436;text-align:center;margin-bottom:6px}
.modsub{font-size:13px;color:#636E72;text-align:center;margin-bottom:20px}
.gbtn{width:100%;padding:14px;border-radius:14px;border:2px solid #E1E8ED;background:white;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px}
.mbtn{width:100%;background:linear-gradient(135deg,#FF6B35,#FF8C61);color:white;border:none;padding:15px;border-radius:14px;font-size:16px;font-weight:800;cursor:pointer;margin-bottom:10px}
.sbtn{width:100%;background:#F0F3F5;color:#2D3436;border:none;padding:13px;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer}
.otype{display:flex;gap:10px;margin-bottom:18px}
.otbtn{flex:1;padding:14px;border-radius:14px;border:2px solid #FFE5CC;background:white;cursor:pointer;text-align:center;font-size:14px;font-weight:600}
.otbtn.active{background:linear-gradient(135deg,#FF6B35,#FF8C61);color:white;border-color:#FF6B35}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px}
.field input{width:100%;padding:12px 14px;border-radius:10px;border:2px solid #FFE5CC;font-size:15px;font-family:'Poppins',sans-serif}
.brow{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #FFF0E6;font-size:14px;font-weight:600}
.btotal{display:flex;justify-content:space-between;padding:14px 0;font-size:20px;font-weight:800;color:#FF6B35;border-top:2px solid #FFE8D6;margin-top:8px}
.ptsbox{background:#FFF5E6;border:2px solid #FFD93D;border-radius:12px;padding:12px;text-align:center;margin-bottom:14px}
.ptsbtn{background:#44CF6C;color:white;border:none;padding:7px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;margin-top:6px}
.okcard{background:linear-gradient(135deg,#44CF6C,#38B85E);color:white;border-radius:16px;padding:22px;text-align:center;margin-bottom:16px}
.owrap{padding:16px 16px 80px}
.ocard{background:white;border-radius:18px;padding:16px;margin-bottom:14px;border:2px solid #FFE8D6}
.steps{display:flex;justify-content:space-between;background:#FFF5E6;border-radius:12px;padding:12px;margin:10px 0}
.step{flex:1;text-align:center}
.sdot{width:36px;height:36px;border-radius:50%;background:#DFE6E9;display:flex;align-items:center;justify-content:center;margin:0 auto 5px;font-size:16px}
.step.now .sdot,.step.done .sdot{background:linear-gradient(135deg,#44CF6C,#38B85E);color:white}
.slbl{font-size:10px;color:#636E72;font-weight:600}
.empty{text-align:center;padding:48px 20px;color:#636E72}
.empty .ei{font-size:64px;margin-bottom:14px}
</style>
</head>
<body>

<div id="splash">
  <div style="font-size:80px;animation:jump 1s infinite">🍔</div>
  <div style="color:white;font-size:26px;font-weight:800;margin-top:16px">Fooddie Cafe</div>
</div>

<!-- LOGIN -->
<div class="ov show" id="loginOv">
  <div class="mod">
    <h2>Welcome! 👋</h2>
    <div class="modsub">Login to earn loyalty points</div>
    <button class="gbtn" onclick="loginGoogle()">
      <svg width="18" height="18" viewBox="0 0 20 20"><path fill="#4285F4" d="M19.6 10.23c0-.82-.1-1.42-.25-2.05H10v3.72h5.5c-.15.96-.74 2.31-2.04 3.22v2.45h3.16c1.89-1.73 2.98-4.3 2.98-7.34z"/><path fill="#34A853" d="M13.46 15.13c-.83.59-1.96 1-3.46 1-2.64 0-4.88-1.74-5.68-4.15H1.07v2.52C2.72 17.75 6.09 20 10 20c2.7 0 4.96-.89 6.62-2.42l-3.16-2.45z"/><path fill="#FBBC05" d="M3.99 10c0-.69.12-1.35.32-1.97V5.51H1.07A9.973 9.973 0 000 10c0 1.61.39 3.14 1.07 4.49l3.24-2.52c-.2-.62-.32-1.28-.32-1.97z"/><path fill="#EA4335" d="M10 3.88c1.88 0 3.13.81 3.85 1.48l2.84-2.76C14.96.99 12.7 0 10 0 6.09 0 2.72 2.25 1.07 5.51l3.24 2.52C5.12 5.62 7.36 3.88 10 3.88z"/></svg>
      Login with Google
    </button>
    <button class="sbtn" onclick="guestLogin()">Continue as Guest</button>
  </div>
</div>

<!-- ORDER TYPE -->
<div class="ov" id="otOv">
  <div class="mod">
    <h2>Order Type</h2>
    <div class="modsub">Select your preference</div>
    <div class="otype">
      <button class="otbtn active" id="dineBtn" onclick="setType('dine-in')">
        <div style="font-size:28px;margin-bottom:6px">🪑</div>Dine In
      </button>
      <button class="otbtn" id="takeBtn" onclick="setType('takeaway')">
        <div style="font-size:28px;margin-bottom:6px">🥡</div>Takeaway
      </button>
    </div>
    <div id="tfield" class="field">
      <label>Table Number</label>
      <input type="number" id="tno" placeholder="Enter table number" min="1">
    </div>
    <div id="nfield" class="field" style="display:none">
      <label>Your Name</label>
      <input type="text" id="cname" placeholder="Enter your name">
    </div>
    <button class="mbtn" onclick="startOrder()">Start Ordering 🍽️</button>
  </div>
</div>

<!-- MAIN -->
<div class="app" id="mainApp" style="display:none">
  <div class="header">
    <div style="font-size:44px;margin-bottom:8px">🍔</div>
    <h1>Fooddie Cafe</h1>
    <p>Fresh, Delicious, Every Time!</p>
    <div id="ptsBar" style="display:none">
      <div class="pts-bar">⭐ <span id="ptsVal">0</span> Points</div>
    </div>
    <div id="userBar" style="display:none" class="user-bar">
      <img id="uPhoto" src="">
      <span id="uName"></span>
      <button class="ubtn" onclick="doLogout()">Logout</button>
    </div>
    <div class="tabs">
      <button class="tab active" id="mTabBtn" onclick="goTab('menu',this)">🍽️ Menu</button>
      <button class="tab" id="oTabBtn" onclick="goTab('orders',this)">📋 My Orders</button>
    </div>
  </div>

  <div id="menuTab">
    <div class="sbox">
      <span class="si">🔍</span>
      <input type="text" id="srch" placeholder="Search dishes...">
    </div>
    <div class="cats" id="catsBar"></div>
    <div class="mwrap" id="mwrap">
      <div class="empty"><div class="ei">⏳</div><p>Loading menu...</p></div>
    </div>
  </div>

  <div id="ordersTab" style="display:none">
    <div class="owrap" id="owrap"></div>
  </div>

  <div class="paybar">
    <span style="font-size:12px;font-weight:600;color:#636E72">We Accept:</span>
    <span style="font-size:22px">💵</span>
    <span style="font-size:22px">📱</span>
    <span style="font-size:22px">💳</span>
  </div>

  <button class="cartbtn" id="cartBtn" style="display:none" onclick="openBill()">
    <span>View Bill</span>
    <span class="cbadge" id="cartBadge">0</span>
  </button>
</div>

<!-- BILL -->
<div class="ov" id="billOv">
  <div class="mod" id="billMod"></div>
</div>

<!-- RATING -->
<div class="ov" id="rateOv">
  <div class="mod">
    <h2>Rate Your Order ⭐</h2>
    <div class="modsub">How was your experience?</div>
    <div style="display:flex;justify-content:center;gap:8px;margin-bottom:18px">
      <span style="font-size:34px;cursor:pointer" onclick="pickStar(1)">⭐</span>
      <span style="font-size:34px;cursor:pointer" onclick="pickStar(2)">⭐</span>
      <span style="font-size:34px;cursor:pointer" onclick="pickStar(3)">⭐</span>
      <span style="font-size:34px;cursor:pointer" onclick="pickStar(4)">⭐</span>
      <span style="font-size:34px;cursor:pointer" onclick="pickStar(5)">⭐</span>
    </div>
    <div class="field">
      <label>Feedback (optional)</label>
      <textarea id="fbTxt" style="width:100%;padding:10px;border-radius:10px;border:2px solid #FFE5CC;resize:none;height:80px;font-family:'Poppins',sans-serif;font-size:14px"></textarea>
    </div>
    <button class="mbtn" onclick="sendRating()">Submit</button>
    <button class="sbtn" onclick="closeRate()">Skip</button>
  </div>
</div>

<script>
// ── FIREBASE CONFIG ──────────────────────────────────
const FB_URL = 'https://dineflow-f9133-default-rtdb.firebaseio.com';
const FB_KEY = 'AIzaSyCv39nv9QM6jhJD5Hz8Rrf1rR_EKCOewXk';

// ── STATE ────────────────────────────────────────────
var menuData=[], cart={}, specials=[], currentUser=null, isGuest=false;
var orderType='dine-in', tableNo='', custName='';
var activeCat='All', srchQ='', userPts=0, taxRate=5, features={};
var popular=[], myOrders=[], rateId=null, starRating=0;

// ── SPLASH ───────────────────────────────────────────
setTimeout(function(){
  var s=document.getElementById('splash');
  if(s){s.style.opacity='0';setTimeout(function(){s.style.display='none';},1000);}
}, 2000);

// ── FIREBASE HELPERS ─────────────────────────────────
function fbGet(path, cb){
  fetch(FB_URL+path+'.json')
    .then(function(r){return r.json();})
    .then(function(d){cb(null,d);})
    .catch(function(e){cb(e,null);});
}

function fbPush(path, data, cb){
  fetch(FB_URL+path+'.json', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(data)
  }).then(function(r){return r.json();})
    .then(function(d){if(cb)cb(null,d);})
    .catch(function(e){if(cb)cb(e,null);});
}

function fbUpdate(path, data, cb){
  fetch(FB_URL+path+'.json', {
    method:'PATCH',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(data)
  }).then(function(r){return r.json();})
    .then(function(d){if(cb)cb(null,d);})
    .catch(function(e){if(cb)cb(e,null);});
}

// ── GOOGLE AUTH (Firebase REST) ──────────────────────
function loginGoogle(){
  if(typeof firebase!=='undefined'&&firebase.apps&&firebase.apps.length){
    doGoogleLogin();return;
  }
  // Load app first
  var s1=document.createElement('script');
  s1.src='https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js';
  document.head.appendChild(s1);
  s1.onload=function(){
    var s2=document.createElement('script');
    s2.src='https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js';
    document.head.appendChild(s2);
    s2.onload=function(){doGoogleLogin();};
  };
}

function doGoogleLogin(){
  var cfg={
    apiKey:FB_KEY,
    authDomain:'dineflow-f9133.firebaseapp.com',
    projectId:'dineflow-f9133',
    appId:'1:543639406991:web:b1da8522c78d4e10f9a3fa'
  };
  if(!firebase.apps.length) firebase.initializeApp(cfg);
  var provider=new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithPopup(provider)
    .then(function(result){
      currentUser=result.user;
      isGuest=false;
      setupUser();
      document.getElementById('loginOv').classList.remove('show');
      document.getElementById('otOv').classList.add('show');
    })
    .catch(function(e){
      console.log('Login error:',e.code,e.message);
      if(e.code!=='auth/popup-closed-by-user') alert('Login failed: '+e.message);
    });
}

function setupUser(){
  if(!currentUser) return;
  fbGet('/fooddie/users/'+currentUser.uid, function(err,data){
    if(!data){
      fbUpdate('/fooddie/users/'+currentUser.uid,{
        email:currentUser.email,
        name:currentUser.displayName,
        photo:currentUser.photoURL,
        points:0,
        createdAt:Date.now()
      });
    } else {
      userPts=data.points||0;
      document.getElementById('ptsVal').textContent=userPts;
      document.getElementById('ptsBar').style.display='block';
    }
  });
  if(currentUser.photoURL) document.getElementById('uPhoto').src=currentUser.photoURL;
  document.getElementById('uName').textContent=currentUser.displayName||'User';
  document.getElementById('userBar').style.display='flex';
}

function guestLogin(){
  isGuest=true;
  document.getElementById('loginOv').classList.remove('show');
  document.getElementById('otOv').classList.add('show');
}

function doLogout(){location.reload();}

// ── ORDER TYPE ────────────────────────────────────────
function setType(t){
  orderType=t;
  document.getElementById('dineBtn').classList.toggle('active',t==='dine-in');
  document.getElementById('takeBtn').classList.toggle('active',t==='takeaway');
  document.getElementById('tfield').style.display=t==='dine-in'?'block':'none';
  document.getElementById('nfield').style.display=t==='takeaway'?'block':'none';
}

function startOrder(){
  if(orderType==='dine-in'){
    tableNo=document.getElementById('tno').value.trim();
    if(!tableNo){alert('Table number daalo');return;}
  } else {
    custName=document.getElementById('cname').value.trim();
    if(!custName){alert('Naam daalo');return;}
  }
  document.getElementById('otOv').classList.remove('show');
  document.getElementById('mainApp').style.display='block';
  loadData();
}

// ── LOAD DATA ─────────────────────────────────────────
function loadData(){
  // Settings
  fbGet('/fooddie/settings',function(e,d){
    if(d){taxRate=d.taxRate||5;features=d.features||{};}
    // Specials
    fbGet('/fooddie/dailySpecials',function(e2,d2){
      specials=[];
      if(d2){
        Object.keys(d2).forEach(function(k){
          if(d2[k].active) specials.push(Object.assign({id:k},d2[k]));
        });
      }
      // Menu
      fbGet('/fooddie/menu',function(e3,d3){
        menuData=[];
        if(d3){
          Object.keys(d3).forEach(function(k){
            menuData.push(Object.assign({id:k},d3[k]));
          });
        }
        buildCats();
        buildMenu();
        // Poll every 30 seconds for updates
        setInterval(function(){
          fbGet('/fooddie/menu',function(e4,d4){
            if(d4){
              menuData=[];
              Object.keys(d4).forEach(function(k){
                menuData.push(Object.assign({id:k},d4[k]));
              });
              buildCats();
              buildMenu();
            }
          });
        },30000);
      });
    });
  });

  // Search
  document.getElementById('srch').addEventListener('input',function(e){
    srchQ=e.target.value.toLowerCase();
    buildMenu();
  });
}

// ── CATEGORIES ────────────────────────────────────────
function buildCats(){
  var cats=['All'];
  menuData.forEach(function(i){if(i.category&&cats.indexOf(i.category)===-1)cats.push(i.category);});
  document.getElementById('catsBar').innerHTML=cats.map(function(c){
    return '<button class="cbt'+(c===activeCat?' active':'')+'" onclick="pickCat(\''+c+'\')">'+c+'</button>';
  }).join('');
}

function pickCat(c){activeCat=c;buildCats();buildMenu();}

// ── BUILD MENU ────────────────────────────────────────
function buildMenu(){
  var wrap=document.getElementById('mwrap');
  if(!wrap) return;

  var items=activeCat==='All'?menuData.slice():menuData.filter(function(i){return i.category===activeCat;});
  if(srchQ){
    items=items.filter(function(i){
      return i.name.toLowerCase().indexOf(srchQ)>=0 || (i.desc&&i.desc.toLowerCase().indexOf(srchQ)>=0);
    });
  }

  var html='';

  // Specials
  if(specials.length>0&&!srchQ&&activeCat==='All'){
    html+='<div class="spbox"><h3>🎉 Today\'s Specials!</h3>';
    specials.forEach(function(s){
      var qty=cart['sp_'+s.id]||0;
      html+='<div class="spcard">';
      if(s.photo) html+='<img src="'+s.photo+'" class="spimg">';
      else html+='<div class="spico">⭐</div>';
      html+='<div style="flex:1"><div style="font-size:15px;font-weight:700">'+s.name+'</div>';
      html+='<div style="font-size:12px;color:#636E72;margin:2px 0">'+(s.desc||'')+'</div>';
      html+='<div style="font-size:16px;font-weight:800;color:#FF6B35">₹'+s.price+'<span style="font-size:12px;text-decoration:line-through;color:#636E72;margin-left:4px">₹'+s.originalPrice+'</span></div></div>';
      html+='<div class="qbox"><button class="qbtn" onclick="chgCart(\'sp_'+s.id+'\',-1)">−</button><div class="qnum">'+qty+'</div><button class="qbtn" onclick="chgCart(\'sp_'+s.id+'\',1)">+</button></div>';
      html+='</div>';
    });
    html+='</div>';
  }

  if(items.length===0){
    html+='<div class="empty"><div class="ei">🔍</div><p>Koi item nahi mila</p></div>';
  } else {
    items.forEach(function(item){
      var avail=item.available!==false;
      var qty=cart[item.id]||0;
      html+='<div class="mcard'+(avail?'':' unavail')+'">';
      if(!avail) html+='<div class="badge out">Out of Stock</div>';
      if(item.photo) html+='<img src="'+item.photo+'" class="mimg">';
      else html+='<div class="mico">'+(item.icon||'🍽️')+'</div>';
      html+='<div class="iinfo"><h4>'+item.name+'</h4><p>'+(item.desc||'')+'</p><div class="pr">₹'+item.price+'</div></div>';
      html+='<div class="qbox"><button class="qbtn" onclick="chgCart(\''+item.id+'\',-1)">−</button><div class="qnum">'+qty+'</div><button class="qbtn" onclick="chgCart(\''+item.id+'\',1)">+</button></div>';
      html+='</div>';
    });
  }
  wrap.innerHTML=html;
}

// ── CART ──────────────────────────────────────────────
function chgCart(id,delta){
  var isSp=id.indexOf('sp_')===0;
  var realId=isSp?id.replace('sp_',''):id;
  var item=isSp?specials.filter(function(s){return s.id===realId;})[0]:menuData.filter(function(m){return m.id===id;})[0];
  if(!item||item.available===false) return;
  cart[id]=(cart[id]||0)+delta;
  if(cart[id]<=0) delete cart[id];
  refreshCart();
  buildMenu();
}

function refreshCart(){
  var total=Object.values(cart).reduce(function(s,q){return s+q;},0);
  document.getElementById('cartBadge').textContent=total;
  document.getElementById('cartBtn').style.display=total>0?'flex':'none';
}

// ── BILL ──────────────────────────────────────────────
function getCartItems(){
  return Object.keys(cart).map(function(id){
    var qty=cart[id];
    var isSp=id.indexOf('sp_')===0;
    var item=isSp?specials.filter(function(s){return s.id===id.replace('sp_','');})[0]:menuData.filter(function(m){return m.id===id;})[0];
    return{name:item.name,qty:qty,price:item.price,total:item.price*qty};
  });
}

function prepTime(n){return n<=3?'10-15':n<=6?'15-20':n<=10?'20-25':'25-30';}

function openBill(){showBill(false);}

function showBill(discounted){
  var items=getCartItems();
  var sub=items.reduce(function(s,i){return s+i.total;},0);
  var tax=Math.round(sub*taxRate)/100;
  var disc=discounted?50:0;
  var total=sub+tax-disc;
  var pt=prepTime(items.reduce(function(s,i){return s+i.qty;},0));

  var h='<h2>🧾 Your Bill</h2><div class="modsub">Fooddie Cafe</div>';
  if(!discounted&&!isGuest&&userPts>=100){
    h+='<div class="ptsbox"><p>⭐ You have '+userPts+' points!<br><small>100 pts = ₹50 discount</small></p><button class="ptsbtn" onclick="showBill(true)">Use Points → Save ₹50</button></div>';
  }
  if(discounted){
    h+='<div style="background:#D5F5E3;border:2px solid #44CF6C;border-radius:12px;padding:10px;text-align:center;margin-bottom:14px;font-weight:700;color:#27AE60;font-size:13px">✅ ₹50 Discount Applied!</div>';
  }
  h+='<div style="text-align:center;margin-bottom:16px"><span style="background:linear-gradient(135deg,#FFD93D,#FFC107);padding:5px 16px;border-radius:16px;font-size:12px;font-weight:700;color:#2D3436">⏱️ Ready in '+pt+' mins</span></div>';
  h+=items.map(function(i){return '<div class="brow"><span>'+i.name+' ×'+i.qty+'</span><span>₹'+i.total+'</span></div>';}).join('');
  h+='<div style="margin-top:8px"><div class="brow"><span>Subtotal</span><span>₹'+sub+'</span></div><div class="brow"><span>Tax ('+taxRate+'%)</span><span>₹'+tax.toFixed(2)+'</span></div>';
  if(disc>0) h+='<div class="brow" style="color:#44CF6C"><span>Points Discount</span><span>-₹'+disc+'</span></div>';
  h+='</div><div class="btotal"><span>Total</span><span>₹'+total.toFixed(2)+'</span></div>';
  h+='<button class="mbtn" style="margin-top:16px" onclick="placeOrder('+total.toFixed(2)+',&quot;'+pt+'&quot;,'+(discounted?100:0)+')">✅ Place Order</button>';
  h+='<button class="sbtn" onclick="closeBill()">Back</button>';

  document.getElementById('billMod').innerHTML=h;
  document.getElementById('billOv').classList.add('show');
}

function closeBill(){document.getElementById('billOv').classList.remove('show');}

function placeOrder(total,pt,ptsUsed){
  var items=Object.keys(cart).map(function(id){
    var qty=cart[id];
    var isSp=id.indexOf('sp_')===0;
    var item=isSp?specials.filter(function(s){return s.id===id.replace('sp_','');})[0]:menuData.filter(function(m){return m.id===id;})[0];
    return{name:item.name,qty:qty,price:item.price};
  });
  var order={items:items,total:total,prepTime:pt,timestamp:Date.now(),status:'pending',orderStatus:'pending',orderType:orderType,tableNumber:orderType==='dine-in'?tableNo:null,customerName:orderType==='takeaway'?custName:null,userId:currentUser?currentUser.uid:null,isGuest:isGuest,acknowledged:false};
  fbPush('/fooddie/orders',order,function(){});
  if(!isGuest&&currentUser&&features.loyaltySystem){
    var earned=Math.floor(total/10);
    fbUpdate('/fooddie/users/'+currentUser.uid,{points:Math.max(0,userPts+earned-ptsUsed)});
  }
  var info=orderType==='dine-in'?'Table '+tableNo:'Takeaway - '+custName;
  document.getElementById('billMod').innerHTML='<div class="okcard"><div style="font-size:48px;margin-bottom:10px">✅</div><h3 style="font-size:20px;margin-bottom:6px">Order Placed!</h3><p>'+info+'</p><p style="margin-top:6px;font-size:14px">Ready in: '+pt+' mins</p></div><button class="sbtn" onclick="afterOrder()">Close</button>';
  cart={};refreshCart();
}

function afterOrder(){closeBill();if(!isGuest)goTab('orders',document.getElementById('oTabBtn'));}

// ── TABS ──────────────────────────────────────────────
function goTab(tab,btn){
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('active');});
  if(btn)btn.classList.add('active');
  document.getElementById('menuTab').style.display=tab==='menu'?'block':'none';
  document.getElementById('ordersTab').style.display=tab==='orders'?'block':'none';
  if(tab==='orders')loadOrders();
}

// ── MY ORDERS ─────────────────────────────────────────
function loadOrders(){
  if(isGuest){document.getElementById('owrap').innerHTML='<div class="empty"><div class="ei">🔐</div><p>Login to see orders</p></div>';return;}
  fbGet('/fooddie/orders',function(e,d){
    myOrders=[];
    if(d){
      Object.keys(d).forEach(function(k){
        var o=d[k];
        if(o.userId===currentUser.uid) myOrders.push(Object.assign({id:k},o));
      });
    }
    myOrders.sort(function(a,b){return b.timestamp-a.timestamp;});
    renderOrders();
  });
}

function renderOrders(){
  if(myOrders.length===0){document.getElementById('owrap').innerHTML='<div class="empty"><div class="ei">📋</div><p>No orders yet</p></div>';return;}
  document.getElementById('owrap').innerHTML=myOrders.map(function(o){
    var st=o.orderStatus||o.status;
    var dt=new Date(o.timestamp).toLocaleString();
    var itms=o.items.map(function(i){return i.qty+'× '+i.name;}).join(', ');
    var done=st==='completed'||st==='delivered';
    var h='<div class="ocard"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:12px;color:#636E72">'+dt+'</span><span style="background:#D5F5E3;color:#27AE60;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700">'+st+'</span></div>';
    if(!done){h+='<div class="steps"><div class="step '+(st==='pending'?'now':'done')+'"><div class="sdot">📝</div><div class="slbl">Pending</div></div><div class="step '+(st==='preparing'?'now':(st==='ready'||done?'done':''))+'"><div class="sdot">👨‍🍳</div><div class="slbl">Preparing</div></div><div class="step '+(st==='ready'?'now':(done?'done':''))+'"><div class="sdot">✅</div><div class="slbl">Ready</div></div></div>';}
    h+='<div style="font-size:13px;color:#2D3436;margin-bottom:6px">'+itms+'</div><div style="font-size:17px;font-weight:800;color:#FF6B35;margin-bottom:10px">₹'+o.total+'</div>';
    if(done){h+=o.rating?'<div style="text-align:center">'+'⭐'.repeat(o.rating)+'</div>':'<button class="mbtn" style="padding:10px;font-size:14px" onclick="openRate(\''+o.id+'\')">⭐ Rate This Order</button>';}
    h+='</div>';
    return h;
  }).join('');
}

// ── RATING ────────────────────────────────────────────
function openRate(id){rateId=id;starRating=0;document.getElementById('fbTxt').value='';document.getElementById('rateOv').classList.add('show');}
function pickStar(n){starRating=n;}
function closeRate(){document.getElementById('rateOv').classList.remove('show');}
function sendRating(){
  if(!starRating){alert('Star select karo');return;}
  fbUpdate('/fooddie/orders/'+rateId,{rating:starRating,feedback:document.getElementById('fbTxt').value.trim()},function(){closeRate();loadOrders();});
}
</script>
</body>
</html>
